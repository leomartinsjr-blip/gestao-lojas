<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Pagamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── Header ── */
.fp-header{background:#161b22;border-bottom:1px solid #30363d;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100}
.fp-header-title{font-weight:700;font-size:1rem;color:#58a6ff;white-space:nowrap}
.fp-header-back{font-size:.8rem;color:#8b949e;cursor:pointer;padding:.3rem .6rem;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;transition:background .15s}
.fp-header-back:hover{background:#21262d}
.fp-period{display:flex;gap:.5rem;align-items:center;margin-left:auto}
.fp-period select{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.3rem .5rem;border-radius:6px;font-size:.85rem}

/* ── Layout ── */
.fp-body{max-width:1200px;margin:0 auto;padding:1.5rem}

/* ── Barra config mensal ── */
.fp-mensal-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:1rem;flex-wrap:wrap}
.fp-mensal-bar input{width:52px;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.25rem .4rem;border-radius:5px;font-size:.85rem;text-align:center}
.fp-mensal-bar input:focus{outline:none;border-color:#388bfd}

/* ── Store buttons ── */
.fp-stores{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.fp-store-btn{padding:.45rem 1rem;border-radius:8px;border:1px solid transparent;background:#21262d;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;color:#8b949e}
.fp-store-btn:hover{background:#30363d}
.fp-store-btn.active{color:#fff;background:color-mix(in srgb,var(--c) 20%,transparent);border-color:var(--c)}

/* ── Panel ── */
.fp-panel{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden}
.fp-panel-header{padding:.75rem 1rem;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:.75rem;background:#21262d}
.fp-panel-title{font-weight:600;font-size:.95rem}
.fp-panel-actions{display:flex;gap:.5rem;margin-left:auto;flex-wrap:wrap}
.fp-btn{padding:.35rem .8rem;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.fp-btn:hover{background:#30363d}
.fp-btn.primary{background:#1f6feb;border-color:#388bfd;color:#fff}
.fp-btn.primary:hover{background:#388bfd}
.fp-btn.success{background:#1a7f37;border-color:#2ea043;color:#fff}
.fp-btn.success:hover{background:#2ea043}
.fp-btn.warning{background:#9e6a03;border-color:#d29922;color:#fff}
.fp-btn.warning:hover{background:#d29922}

/* ── Employee tabs ── */
.fp-emp-tabs{display:flex;flex-wrap:wrap;gap:.25rem;padding:.5rem .75rem;border-bottom:1px solid #30363d;background:#0d1117}
.fp-emp-tab{padding:.3rem .65rem;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:.8rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.fp-emp-tab:hover{background:#21262d;color:#e6edf3}
.fp-emp-tab.active{background:#21262d;color:#58a6ff;border-color:#388bfd}
.fp-emp-tab.has-data{color:#3fb950}
.fp-emp-tab.has-data.active{color:#3fb950;border-color:#3fb950}

/* ── Folha form ── */
.fp-emp-form{padding:1rem;display:none}
.fp-emp-form.active{display:block}

.fp-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:700px){.fp-form-grid{grid-template-columns:1fr}}

.fp-section{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:.75rem}
.fp-section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;color:#58a6ff;letter-spacing:.05em;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.fp-section-total{margin-left:auto;font-size:.85rem;color:#e6edf3;font-weight:700}

.fp-field{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.fp-field label{font-size:.8rem;color:#8b949e;min-width:160px;flex-shrink:0}
.fp-field input{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.25rem .5rem;border-radius:5px;font-size:.85rem;width:120px;text-align:right}
.fp-field input:focus{outline:none;border-color:#388bfd}
.fp-field .fp-badge{font-size:.72rem;padding:.1rem .35rem;border-radius:4px;background:#21262d;color:#8b949e;border:1px solid #30363d}
.fp-field .fp-badge.faixa{background:color-mix(in srgb,#1f6feb 20%,transparent);color:#58a6ff;border-color:#388bfd40}
.fp-field .fp-badge.pct{background:color-mix(in srgb,#3fb950 15%,transparent);color:#3fb950;border-color:#3fb95040}

.fp-total-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-top:1px solid #30363d;margin-top:.4rem}
.fp-total-row label{font-size:.85rem;font-weight:700;color:#e6edf3}
.fp-total-val{font-size:.95rem;font-weight:700;color:#3fb950}

.fp-liquido-bar{margin-top:.75rem;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center}
.fp-liquido-label{font-size:.85rem;color:#8b949e;font-weight:600}
.fp-liquido-val{font-size:1.3rem;font-weight:800;color:#58a6ff}

/* ── Extras rows ── */
.fp-extras{margin-top:.25rem}
.fp-extra-row{display:flex;gap:.4rem;align-items:center;margin-bottom:.3rem}
.fp-extra-row input[type=text]{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.22rem .4rem;border-radius:5px;font-size:.8rem;flex:1}
.fp-extra-row input[type=number]{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.22rem .4rem;border-radius:5px;font-size:.8rem;width:100px;text-align:right}
.fp-extra-btn{background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:.9rem;line-height:1;display:flex;align-items:center;justify-content:center}
.fp-extra-btn:hover{background:#21262d;color:#e6edf3}
.fp-add-extra{font-size:.75rem;color:#58a6ff;cursor:pointer;background:transparent;border:none;padding:.1rem 0;margin-top:.2rem}
.fp-add-extra:hover{text-decoration:underline}

/* ── Config modal ── */
.fp-modal-overlay{position:fixed;inset:0;background:#000a;z-index:200;display:none;align-items:center;justify-content:center}
.fp-modal-overlay.open{display:flex}
.fp-modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:1.5rem;min-width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.fp-modal h3{font-size:1rem;margin-bottom:1rem;color:#58a6ff}
.fp-modal-tabs{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.fp-modal-tab{padding:.25rem .6rem;border-radius:5px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:.8rem;cursor:pointer}
.fp-modal-tab.active{background:#21262d;color:#e6edf3;border-color:#58a6ff}
.fp-modal-content{display:none}
.fp-modal-content.active{display:block}
.fp-cfg-field{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.fp-cfg-field label{font-size:.82rem;color:#8b949e;min-width:180px}
.fp-cfg-field input{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.25rem .5rem;border-radius:5px;font-size:.84rem;width:100px;text-align:right}
.fp-cfg-faixas{margin-bottom:.75rem}
.fp-cfg-faixas table{width:100%;border-collapse:collapse;font-size:.82rem}
.fp-cfg-faixas th{color:#8b949e;padding:.25rem .5rem;text-align:left;border-bottom:1px solid #30363d}
.fp-cfg-faixas td{padding:.2rem .4rem}
.fp-cfg-faixas td input{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.2rem .4rem;border-radius:4px;font-size:.82rem;width:90px;text-align:right}
.fp-modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;padding-top:.75rem;border-top:1px solid #30363d}

/* ── Inline formula row (Vendas × % = Total) ── */
.fp-field-inline{flex-wrap:wrap;gap:.35rem}
.fp-times,.fp-equals{font-size:.9rem;color:#8b949e;flex-shrink:0}
.fp-label-pct{font-size:.8rem;color:#8b949e;flex-shrink:0}
.fp-total-inline{font-size:.95rem;font-weight:700;color:#58a6ff;white-space:nowrap}

/* ── Accounting split box ── */
.fp-split-box{margin:.4rem 0 .6rem 1rem;border-left:2px solid #30363d;padding-left:.75rem}
.fp-split-title{font-size:.72rem;color:#8b949e;margin-bottom:.35rem;font-style:italic}
.fp-split-row{margin-bottom:.2rem}
.fp-split-hint{font-size:.7rem;color:#484f58;white-space:nowrap}
.fp-split-check{font-size:.75rem;padding:.2rem 0;margin-top:.15rem}
.fp-readonly{background:#161b22 !important;color:#6e7681 !important;cursor:default}

/* ── Emp config section ── */
.fp-emp-cfg-wrap{margin-top:.75rem;border:1px solid #30363d;border-radius:8px;overflow:hidden}
.fp-emp-cfg-toggle{padding:.45rem .75rem;background:#161b22;cursor:pointer;font-size:.8rem;color:#58a6ff;font-weight:600;display:flex;align-items:center;gap:.5rem;user-select:none}
.fp-emp-cfg-toggle:hover{background:#21262d}
.fp-emp-cfg{display:none;padding:.65rem .75rem;background:#0d1117;border-top:1px solid #30363d}
.fp-emp-cfg-wrap.open .fp-emp-cfg{display:block}
.fp-emp-cfg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.3rem .75rem;margin-bottom:.5rem}
.fp-emp-cfg-row{display:flex;align-items:center;gap:.4rem}
.fp-emp-cfg-row label{font-size:.78rem;color:#8b949e;flex:1;min-width:130px}
.fp-emp-cfg-actions{display:flex;gap:.5rem;flex-wrap:wrap;padding-top:.4rem;border-top:1px solid #21262d}

/* ── Empty state ── */
.fp-empty{padding:3rem;text-align:center;color:#8b949e;font-size:.9rem}

/* ── Encerrada ── */
.fp-panel-encerrada .fp-emp-form input:not([type=button]){pointer-events:none;opacity:.55;background:#0d1117!important}
.fp-panel-encerrada .fp-add-extra{display:none}
.fp-btn.encerrar{border-color:#f85149;color:#f85149}
.fp-btn.encerrar:hover{background:rgba(248,81,73,.1)}
.fp-btn.reabrir{background:#1a7f37;border-color:#2ea043;color:#fff}
.fp-btn.reabrir:hover{background:#2ea043}

/* ── Toast ── */
#fpToast{position:fixed;bottom:1.5rem;right:1.5rem;background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:.6rem 1.1rem;border-radius:8px;font-size:.85rem;z-index:999;display:none;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="fp-header">
  <button class="fp-header-back" onclick="location.href='/'">← Voltar</button>
  <span class="fp-header-title">Folha de Pagamento</span>
  <div class="fp-period">
    <select id="fpMonth"></select>
    <select id="fpYear"></select>
  </div>
</div>

<div class="fp-body">
  <div class="fp-mensal-bar" id="fpMensalBar"></div>
  <div class="fp-stores" id="fpStores"></div>
  <div id="fpPanel"></div>
</div>

<div id="fpToast"></div>

<!-- Config Modal -->
<div class="fp-modal-overlay" id="fpConfigModal">
  <div class="fp-modal">
    <h3 id="fpConfigTabs">Configuração</h3>
    <div id="fpConfigContents"></div>
    <div class="fp-modal-actions">
      <button class="fp-btn" onclick="fpCloseConfig()">Cancelar</button>
      <button class="fp-btn primary" onclick="fpSaveConfig()">Salvar</button>
    </div>
  </div>
</div>

<script src="/folha.js"></script>
</body>
</html>
