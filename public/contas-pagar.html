<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contas a Pagar</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d; --border2: #444c56;
    --text: #e6edf3; --text2: #8b949e; --green: #3fb950; --red: #f85149; --yellow: #fbbf24;
    --blue: #58a6ff; --topbar-h: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; min-height: 100vh; }

  #cp-topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; padding: 0 16px; z-index: 100;
  }
  .cp-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .cp-back-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); cursor: pointer; padding: 4px 8px; font-size: 12px; display: flex; align-items: center; gap: 4px;
  }
  .cp-back-btn:hover { color: var(--text); border-color: var(--border2); }
  .cp-filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .cp-filters label { color: var(--text2); font-size: 11px; }
  .cp-filters input[type=date], .cp-filters select {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 4px 8px; font-size: 12px; cursor: pointer;
  }
  .cp-filters input[type=date]:focus, .cp-filters select:focus { outline: none; border-color: var(--blue); }
  .cp-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); cursor: pointer; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 5px;
  }
  .cp-btn:hover { color: var(--blue); border-color: var(--blue); }
  .cp-btn.loading { opacity: .6; pointer-events: none; }

  #cp-body { margin-top: var(--topbar-h); padding: 16px; }

  /* Summary cards */
  #cp-summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .cp-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; min-width: 130px; flex: 1;
  }
  .cp-card-label { color: var(--text2); font-size: 11px; margin-bottom: 4px; }
  .cp-card-value { font-size: 16px; font-weight: 700; }

  /* Store filter */
  #cp-store-totals { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .cp-store-badge {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; cursor: pointer; font-size: 11px; white-space: nowrap;
  }
  .cp-store-badge.active, .cp-store-badge:hover { border-color: var(--blue); color: var(--blue); }
  .cp-store-badge span { color: var(--text2); margin-left: 4px; }

  /* Status filter chips */
  #cp-status-filter { display: flex; gap: 6px; margin-bottom: 14px; }
  .cp-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text2);
  }
  .cp-chip.active-all   { border-color: var(--text2); color: var(--text); }
  .cp-chip.active-aberto  { border-color: var(--blue);   color: var(--blue);   background: rgba(88,166,255,.1); }
  .cp-chip.active-vencido { border-color: var(--red);    color: var(--red);    background: rgba(248,81,73,.1); }
  .cp-chip.active-pago    { border-color: var(--green);  color: var(--green);  background: rgba(63,185,80,.1); }

  /* Accordion groups */
  .cp-group { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .cp-group-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--bg2); cursor: pointer; user-select: none;
  }
  .cp-group-header:hover { background: var(--bg3); }
  .cp-group-chevron { color: var(--text2); transition: transform .2s; flex-shrink: 0; }
  .cp-group-chevron.open { transform: rotate(90deg); }
  .cp-group-name { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cp-group-meta { display: flex; gap: 14px; align-items: center; flex-shrink: 0; }
  .cp-group-count { color: var(--text2); font-size: 11px; }
  .cp-group-total { font-weight: 700; font-size: 13px; }
  .cp-group-badges { display: flex; gap: 4px; }

  .cp-group-body { display: none; border-top: 1px solid var(--border); overflow-x: auto; }
  .cp-group-body.open { display: block; }

  /* Inner table */
  .cp-inner-table { width: 100%; border-collapse: collapse; }
  .cp-inner-table th {
    background: var(--bg3); color: var(--text2); font-size: 10px; font-weight: 600;
    padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .cp-inner-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .cp-inner-table tr:last-child td { border-bottom: none; }
  .cp-inner-table tr:hover td { background: var(--bg3); }
  .td-num { font-family: monospace; font-size: 11px; color: var(--text2); }
  .td-val { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 600; }
  .td-val-liq { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--text2); }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
  .badge-aberto  { background: rgba(88,166,255,.12); color: var(--blue); }
  .badge-vencido { background: rgba(248,81,73,.12);  color: var(--red); }
  .badge-pago    { background: rgba(63,185,80,.12);  color: var(--green); }

  #cp-empty { text-align: center; color: var(--text2); padding: 48px 16px; font-size: 13px; }
  #cp-error { background: rgba(248,81,73,.1); border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; color: var(--red); font-size: 12px; display: none; }
  #cp-diag-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; }
  #cp-diag-wrap pre { color: var(--text2); font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; margin-top: 6px; }

  .cp-quick-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); cursor: pointer; padding: 4px 9px; font-size: 11px; white-space: nowrap;
  }
  .cp-quick-btn:hover, .cp-quick-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,.08); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    #cp-topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 6px; }
    #cp-body { margin-top: 100px; }
    .cp-filters { margin-left: 0; }
  }
</style>
</head>
<body>

<div id="cp-topbar">
  <button class="cp-back-btn" onclick="window.location.href='/'">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </button>
  <div class="cp-title">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
    </svg>
    Contas a Pagar
  </div>
  <div class="cp-filters">
    <div style="display:flex;gap:4px">
      <button class="cp-quick-btn" id="qHoje">Hoje</button>
      <button class="cp-quick-btn" id="qSemana">Semana</button>
      <button class="cp-quick-btn" id="qProxSemana">Próx. Semana</button>
    </div>
    <label>De</label>
    <input type="date" id="cpDe">
    <label>Até</label>
    <input type="date" id="cpAte">
    <button class="cp-btn" id="cpRefreshBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Atualizar
    </button>
    <button class="cp-btn" id="cpSyncBtn" style="border-color:#3fb950;color:#3fb950">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Importar do Portal
    </button>
    <span id="cpSyncedAt" style="font-size:11px;color:var(--text2)"></span>
  </div>
</div>

<div id="cp-body">
  <div id="cp-error"></div>
  <div id="cp-summary"></div>
  <div id="cp-store-totals"></div>
  <div id="cp-status-filter"></div>
  <div id="cp-groups"></div>
  <div id="cp-empty" style="display:none">Nenhum título encontrado.</div>
  <div id="cp-diag-wrap" style="display:none">
    <strong style="color:var(--text2)">Diagnóstico Microvix</strong>
    <pre id="cp-diag-pre">aguardando…</pre>
  </div>
</div>

<script>
const fmtBRL  = v => 'R$ ' + (v||0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = s => { if (!s) return '—'; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; };

let _allItems   = [];
let _filterBoard  = '';
let _filterStatus = '';

function getToday()        { return new Date().toISOString().slice(0,10); }
function getFirstOfMonth() { return getToday().slice(0,7) + '-01'; }

// ── Load ──────────────────────────────────────────────────────────────────
async function loadData() {
  const de  = document.getElementById('cpDe').value  || getFirstOfMonth();
  const ate = document.getElementById('cpAte').value || getToday();
  const btn = document.getElementById('cpRefreshBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Carregando…';
  document.getElementById('cp-error').style.display = 'none';

  try {
    const r = await fetch(`/api/contas-pagar?de=${de}&ate=${ate}`, { credentials: 'include' });
    if (r.status === 401 || r.status === 403) { window.location.href = '/'; return; }
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    _allItems    = data.items || [];
    _filterBoard  = '';
    _filterStatus = '';

    if (data.syncedAt) {
      const d = new Date(data.syncedAt);
      document.getElementById('cpSyncedAt').textContent =
        `Importado: ${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    } else {
      document.getElementById('cpSyncedAt').textContent = 'Nunca importado — clique em "Importar do Portal"';
    }

    renderAll();

    if (!_allItems.length) {
      document.getElementById('cp-diag-wrap').style.display = '';
      runDiagnostic();
    } else {
      document.getElementById('cp-diag-wrap').style.display = 'none';
    }
  } catch (e) {
    const errEl = document.getElementById('cp-error');
    errEl.style.display = '';
    errEl.textContent = 'Erro ao carregar: ' + e.message;
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Atualizar';
  }
}

// ── Filtered view ─────────────────────────────────────────────────────────
function getFiltered() {
  return _allItems.filter(it => {
    if (_filterBoard  && it.board  !== _filterBoard)  return false;
    if (_filterStatus && it.status !== _filterStatus) return false;
    return true;
  });
}

// ── Render all ────────────────────────────────────────────────────────────
function renderAll() {
  renderSummary();
  renderStoreTotals();
  renderStatusFilter();
  renderGroups();
}

function renderSummary() {
  const items   = _allItems;
  const aberto  = items.filter(i => i.status === 'aberto').reduce((s,i)  => s + i.valor, 0);
  const vencido = items.filter(i => i.status === 'vencido').reduce((s,i) => s + i.valor, 0);
  const pago    = items.filter(i => i.status === 'pago').reduce((s,i)    => s + i.valor, 0);
  const total   = aberto + vencido + pago;

  document.getElementById('cp-summary').innerHTML = `
    <div class="cp-card"><div class="cp-card-label">Total Geral</div><div class="cp-card-value">${fmtBRL(total)}</div></div>
    <div class="cp-card"><div class="cp-card-label">Em Aberto</div><div class="cp-card-value" style="color:var(--blue)">${fmtBRL(aberto)}</div></div>
    <div class="cp-card"><div class="cp-card-label">Vencido</div><div class="cp-card-value" style="color:var(--red)">${fmtBRL(vencido)}</div></div>
    <div class="cp-card"><div class="cp-card-label">Pago</div><div class="cp-card-value" style="color:var(--green)">${fmtBRL(pago)}</div></div>
    <div class="cp-card"><div class="cp-card-label">Títulos</div><div class="cp-card-value">${items.length}</div></div>
  `;
}

function renderStoreTotals() {
  const byBoard = {};
  _allItems.forEach(it => {
    if (!byBoard[it.board]) byBoard[it.board] = 0;
    byBoard[it.board] += it.valor;
  });
  const el = document.getElementById('cp-store-totals');
  if (!Object.keys(byBoard).length) { el.innerHTML = ''; return; }

  const allBtn = `<div class="cp-store-badge ${!_filterBoard ? 'active' : ''}" data-board="">Todas as lojas</div>`;
  const storeBtns = Object.entries(byBoard).map(([board, total]) =>
    `<div class="cp-store-badge ${_filterBoard === board ? 'active' : ''}" data-board="${board}">${board.toUpperCase()} <span>${fmtBRL(total)}</span></div>`
  ).join('');

  el.innerHTML = allBtn + storeBtns;
  el.querySelectorAll('.cp-store-badge').forEach(b => {
    b.addEventListener('click', () => { _filterBoard = b.dataset.board; renderAll(); });
  });
}

function renderStatusFilter() {
  const counts = { aberto: 0, vencido: 0, pago: 0 };
  getFiltered().forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });

  const el = document.getElementById('cp-status-filter');
  const opts = [
    { v: '',        label: `Todos (${getFiltered().length})`,           cls: 'active-all' },
    { v: 'aberto',  label: `Aberto (${counts.aberto})`,                 cls: 'active-aberto' },
    { v: 'vencido', label: `Vencido (${counts.vencido})`,               cls: 'active-vencido' },
    { v: 'pago',    label: `Pago (${counts.pago})`,                     cls: 'active-pago' },
  ];
  el.innerHTML = opts.map(o =>
    `<div class="cp-chip ${_filterStatus === o.v ? o.cls : ''}" data-val="${o.v}">${o.label}</div>`
  ).join('');
  el.querySelectorAll('.cp-chip').forEach(c => {
    c.addEventListener('click', () => { _filterStatus = c.dataset.val; renderAll(); });
  });
}

// Semana sábado→sexta
function getWeekRange(offsetWeeks = 0) {
  const today = new Date();
  const day   = today.getDay(); // 0=Dom … 6=Sáb
  const diffToSat = day === 6 ? 0 : -(day + 1);
  const sat = new Date(today);
  sat.setDate(today.getDate() + diffToSat + offsetWeeks * 7);
  const fri = new Date(sat);
  fri.setDate(sat.getDate() + 6);
  const iso = d => d.toISOString().slice(0, 10);
  return { de: iso(sat), ate: iso(fri) };
}

function setDates(de, ate) {
  document.getElementById('cpDe').value  = de;
  document.getElementById('cpAte').value = ate;
  document.querySelectorAll('.cp-quick-btn').forEach(b => b.classList.remove('active'));
}

function renderGroups() {
  const items = getFiltered();
  const el    = document.getElementById('cp-groups');
  const empty = document.getElementById('cp-empty');

  if (!items.length) { el.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';

  // Agrupar por loja (board)
  const LOJA_LABEL = { delrey:'Del Rey', minas:'Minas', contagem:'Contagem', estacao:'Estação', tommy:'Tommy', lez:'Lez a Lez', escritorio:'Escritório' };
  const groups = {};
  items.forEach(it => {
    const key = it.board || 'outros';
    if (!groups[key]) groups[key] = { board: key, loja: LOJA_LABEL[key] || key.toUpperCase(), items: [], total: 0 };
    groups[key].items.push(it);
    groups[key].total += it.valor;
  });

  const sorted = Object.values(groups).sort((a, b) => b.total - a.total);

  el.innerHTML = sorted.map((g, gi) => {
    const byStatus = { aberto: 0, vencido: 0, pago: 0 };
    g.items.forEach(i => { if (byStatus[i.status] !== undefined) byStatus[i.status]++; });

    const badges = [
      byStatus.vencido ? `<span class="badge badge-vencido">${byStatus.vencido} venc.</span>` : '',
      byStatus.aberto  ? `<span class="badge badge-aberto">${byStatus.aberto} aberto</span>` : '',
      byStatus.pago    ? `<span class="badge badge-pago">${byStatus.pago} pago</span>` : '',
    ].filter(Boolean).join('');

    const rows = g.items
      .sort((a, b) => (a.vencimento || '').localeCompare(b.vencimento || ''))
      .map(it => {
        const docSerie = [it.documento, it.serie, it.nosso_numero].filter(Boolean).join(' / ') || '—';
        const liqDiff  = it.valorLiquido !== undefined && Math.abs((it.valorLiquido ?? it.valor) - it.valor) > 0.01;
        return `
        <tr>
          <td class="td-num" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${it.fornecedor}">${it.fornecedor || '—'}</td>
          <td class="td-num">${it.codigo_fatura || '—'}</td>
          <td style="white-space:nowrap">${fmtDate(it.vencimento)}</td>
          <td class="td-num" style="text-align:center">${it.parcela || '—'}</td>
          <td class="td-num">${docSerie}</td>
          <td class="td-val">${fmtBRL(it.valor)}</td>
          <td class="td-val-liq" title="${liqDiff ? 'desc/abat/juros/multa' : ''}">${fmtBRL(it.valorLiquido ?? it.valor)}${liqDiff ? ' *' : ''}</td>
          <td><span class="badge badge-${it.status}">${it.status}</span></td>
        </tr>`;
      }).join('');

    return `
    <div class="cp-group" id="grp-${gi}">
      <div class="cp-group-header" data-gi="${gi}">
        <svg class="cp-group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="cp-group-name">${g.loja}</span>
        <div class="cp-group-meta">
          <div class="cp-group-badges">${badges}</div>
          <span class="cp-group-count">${g.items.length} título${g.items.length !== 1 ? 's' : ''}</span>
          <span class="cp-group-total">${fmtBRL(g.total)}</span>
        </div>
      </div>
      <div class="cp-group-body" id="grp-body-${gi}">
        <table class="cp-inner-table">
          <thead>
            <tr>
              <th>Fornecedor</th>
              <th>Nº Fatura</th>
              <th>Vencimento</th>
              <th style="text-align:center">Parcela</th>
              <th>Doc / Série / Nosso Nº</th>
              <th style="text-align:right">Valor Bruto</th>
              <th style="text-align:right">Valor Líquido</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.cp-group-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const gi   = hdr.dataset.gi;
      const body = document.getElementById(`grp-body-${gi}`);
      const chev = hdr.querySelector('.cp-group-chevron');
      const open = body.classList.toggle('open');
      chev.classList.toggle('open', open);
    });
  });
}

// ── Sync ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const today = getToday();
  document.getElementById('cpDe').value  = today;
  document.getElementById('cpAte').value = today;

  document.getElementById('qHoje').addEventListener('click', function() {
    const t = getToday();
    setDates(t, t);
    document.querySelectorAll('.cp-quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    loadData();
  });

  document.getElementById('qSemana').addEventListener('click', function() {
    const { de, ate } = getWeekRange(0);
    setDates(de, ate);
    document.querySelectorAll('.cp-quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    loadData();
  });

  document.getElementById('qProxSemana').addEventListener('click', function() {
    const { de, ate } = getWeekRange(1);
    setDates(de, ate);
    document.querySelectorAll('.cp-quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    loadData();
  });

  document.getElementById('cpRefreshBtn').addEventListener('click', loadData);

  document.getElementById('cpSyncBtn').addEventListener('click', async () => {
    const btn = document.getElementById('cpSyncBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Importando…';
    document.getElementById('cpSyncedAt').textContent = 'Buscando no Microvix…';
    try {
      const de  = document.getElementById('cpDe').value  || getFirstOfMonth();
      const ate = document.getElementById('cpAte').value || getToday();
      const r   = await fetch('/api/contas-pagar/sync', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ de, ate }),
      });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || 'Erro desconhecido');
      document.getElementById('cpSyncedAt').textContent = `Importado: ${d.count} faturas`;
      await loadData();
    } catch (e) {
      document.getElementById('cpSyncedAt').textContent = 'Erro: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Importar do Portal';
    }
  });

  loadData();
});

async function runDiagnostic() {
  const preEl = document.getElementById('cp-diag-pre');
  if (!preEl) return;
  preEl.textContent = 'Testando LinxFaturas…';
  try {
    const r = await fetch('/api/contas-pagar/raw', { credentials: 'include' });
    const d = await r.json();
    if (d.error) { preEl.textContent = 'Erro: ' + d.error; return; }
    const lines = d.results.map(r => {
      if (r.error)          return `❌ ${r.label}\n   ERRO: ${r.error}`;
      if (r.isErr)          return `❌ ${r.label}\n   Microvix: ${r.errMsg}`;
      if (r.rowCount === 0) return `⚠️  ${r.label}\n   OK mas 0 linhas`;
      return `✅ ${r.label}\n   ${r.rowCount} linhas | a pagar: ${r.pagarCount} | a receber: ${r.receberCount}`;
    });
    preEl.textContent = `Loja: ${d.board} | ${d.dtIni} → ${d.dtFin}\n\n` + lines.join('\n\n');
  } catch (e) { preEl.textContent = 'Erro: ' + e.message; }
}
</script>
