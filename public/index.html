<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Operacional</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <h1>Gestão Operacional</h1>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="login-field">
        <label for="loginUser">Usuário</label>
        <input id="loginUser" type="text" autocomplete="username" spellcheck="false" placeholder="seu usuário">
      </div>
      <div class="login-field">
        <label for="loginPass">Senha</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="sua senha">
      </div>
      <div id="loginError" class="login-error hidden"></div>
      <button type="submit" class="login-btn" id="loginBtn">Entrar</button>
    </form>
  </div>
</div>

<!-- TOP BAR -->
<header id="topbar" class="hidden">
  <div class="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Gestão Operacional</span>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="btnPrev" title="Mês anterior">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="current-month" id="currentMonthLabel">—</div>
    <button class="nav-btn" id="btnNext" title="Próximo mês">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="topbar-right">
    <div id="saveIndicator" class="save-indicator hidden">Salvando…</div>
    <select id="monthPicker" title="Ir para mês"></select>
    <button id="perfBtn" class="folgas-topbar-btn" title="Dashboard de Performance">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Performance
    </button>
    <button id="folgasBtn" class="folgas-topbar-btn" title="Calendário de Folgas">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Folgas
    </button>
    <div id="userChip" class="user-chip"></div>
    <button id="logoutBtn" class="logout-btn" title="Sair">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>
</header>

<!-- BOARD -->
<div id="boardContainer"></div>

<!-- PERFORMANCE MODAL -->
<div id="perfOverlay" class="perf-overlay hidden">
  <div class="perf-panel">
    <div class="perf-hdr">
      <span class="perf-hdr-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Dashboard de Performance
      </span>
      <div id="perfStoreTabs" class="perf-store-tabs"></div>
      <div class="perf-view-tabs">
        <button class="perf-view-tab active" data-view="analise">Análise</button>
        <button class="perf-view-tab" data-view="fechamento">Fechamento Diário</button>
      </div>
      <button class="folgas-close-btn" id="perfClose" title="Fechar">✕</button>
    </div>
    <div class="perf-body" id="perfBody"></div>
  </div>
</div>

<!-- FOLGAS MODAL -->
<div id="folgasOverlay" class="folgas-overlay hidden">
  <div class="folgas-panel">
    <div class="folgas-hdr">
      <span class="folgas-hdr-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Calendário de Folgas
      </span>
      <div class="folgas-month-nav">
        <button class="nav-btn" id="folgasPrev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="folgas-month-lbl" id="folgasMonthLbl">—</span>
        <button class="nav-btn" id="folgasNext">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="folgas-close-btn" id="folgasClose" title="Fechar">✕</button>
    </div>

    <div class="folgas-toolbar">
      <select id="folgasBoardFilter" class="folgas-filter"></select>
      <button class="add-item-btn" id="folgasAddEmpBtn">+ Funcionário</button>
      <div id="folgasAddForm" class="folgas-add-inline hidden">
        <input type="text" id="folgasEmpName" class="add-item-input" placeholder="Nome do funcionário…" style="width:180px">
        <select id="folgasEmpBoard" class="folgas-filter"></select>
        <button class="add-item-btn" id="folgasAddConfirm">Adicionar</button>
        <button class="folgas-cancel-btn" id="folgasAddCancel">Cancelar</button>
      </div>
    </div>

    <div class="folgas-body">
      <div class="folgas-table-wrap">
        <table class="folgas-table" id="folgasTable"></table>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- MODAL preview de imagem -->
<div id="imgModal" class="img-modal hidden" onclick="this.classList.add('hidden')">
  <img id="imgModalSrc" src="" alt="">
</div>

<script src="app.js"></script>
</body>
</html>
