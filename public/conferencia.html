<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Conferência de Caixa</title>
<link rel="stylesheet" href="/style.css"/>
<style>
  :root { --radius:8px; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); margin:0; font-size:13px; }

  /* ── Topbar ── */
  .cf-topbar { display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--border); background:var(--surface); }
  .cf-topbar h1 { font-size:14px; font-weight:600; margin:0; }
  .cf-user { margin-left:auto; font-size:11px; color:var(--muted); }

  /* ── Tabs ── */
  .cf-tabs { display:flex; gap:2px; padding:12px 20px 0; border-bottom:1px solid var(--border); }
  .cf-tab { padding:7px 16px; border-radius:6px 6px 0 0; font-size:12px; cursor:pointer;
    border:1px solid transparent; color:var(--muted); background:none; font-family:var(--font); }
  .cf-tab.active { border-color:var(--border); border-bottom-color:var(--bg);
    background:var(--bg); color:var(--text); font-weight:600; }

  /* ── Panels ── */
  .cf-panel { display:none; padding:18px 20px; }
  .cf-panel.active { display:block; }

  /* ── Filter bar ── */
  .cf-filters { display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .cf-fgroup { display:flex; flex-direction:column; gap:3px; }
  .cf-fgroup label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .cf-fgroup select, .cf-fgroup input[type=date] {
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:5px 9px; border-radius:6px; font-size:12px; font-family:var(--font); }
  .cf-fgroup select:focus, .cf-fgroup input:focus { outline:none; border-color:var(--accent,#3b82f6); }

  /* ── Buttons ── */
  .btn-p { background:var(--accent,#3b82f6); color:#fff; border:none; padding:6px 14px;
    border-radius:6px; font-size:12px; cursor:pointer; font-family:var(--font); }
  .btn-p:hover { opacity:.85; }
  .btn-p:disabled { opacity:.5; cursor:default; }
  .btn-grp { display:flex; gap:3px; }
  .btn-seg { background:var(--surface2,#2a2a2a); color:var(--muted); border:1px solid var(--border);
    padding:5px 11px; border-radius:5px; font-size:11px; cursor:pointer; font-family:var(--font); }
  .btn-seg.active { background:var(--accent,#3b82f6); color:#fff; border-color:var(--accent,#3b82f6); }

  /* ── Summary chips ── */
  .cf-summary { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .cf-chip { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:8px 14px; min-width:80px; }
  .cf-chip-val { font-size:18px; font-weight:700; line-height:1.1; }
  .cf-chip-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

  /* ── Cards (grupos) ── */
  .cf-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; margin-bottom:10px; }
  .cf-card-hdr { display:flex; align-items:center; gap:10px; padding:10px 14px;
    cursor:pointer; user-select:none; }
  .cf-card-hdr:hover { background:var(--surface2,#2a2a2a); }
  .cf-card-title { font-weight:600; font-size:13px; flex:1; }
  .cf-card-meta { font-size:11px; color:var(--muted); display:flex; gap:12px; align-items:center; }
  .cf-card-total { font-weight:700; font-size:13px; }
  .cf-chevron { transition:transform .2s; flex-shrink:0; }
  .cf-chevron.open { transform:rotate(90deg); }

  /* ── Table inside cards ── */
  .cf-card-body { display:none; border-top:1px solid var(--border); }
  .cf-card-body.open { display:block; }
  .cf-tbl { width:100%; border-collapse:collapse; }
  .cf-tbl th { padding:5px 12px; text-align:left; font-size:10px; color:var(--muted);
    border-bottom:1px solid var(--border); font-weight:500; white-space:nowrap; }
  .cf-tbl td { padding:6px 12px; border-bottom:1px solid var(--border); vertical-align:top; font-size:12px; }
  .cf-tbl tr:last-child td { border-bottom:none; }
  .cf-tbl tr.row-alert td { background:#f59e0b09; }
  .cf-tbl tr:hover td { background:var(--surface2,#1e1e1e); }
  .cf-tbl td.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .cf-tbl td.mono { font-family:monospace; font-size:11px; }
  .cf-tbl td.muted { color:var(--muted); }

  /* ── Drill row (itens da venda) ── */
  .cf-drill { background:var(--surface2,#1a1a1a); border-top:1px solid var(--border); padding:0; }
  .cf-drill-tbl { width:100%; border-collapse:collapse; font-size:11px; }
  .cf-drill-tbl th { padding:4px 14px 4px 28px; color:var(--muted); font-weight:400; border-bottom:1px solid var(--border); }
  .cf-drill-tbl td { padding:4px 14px 4px 28px; border-bottom:1px solid var(--border); color:var(--muted); }
  .cf-drill-tbl tr:last-child td { border-bottom:none; }
  .cf-drill-tbl td.alert-col { color:#f59e0b; }

  /* ── Badges ── */
  .badge { display:inline-flex; align-items:center; padding:1px 7px; border-radius:10px; font-size:10px; font-weight:600; white-space:nowrap; }
  .badge-parc { background:#f59e0b18; color:#f59e0b; }
  .badge-di   { background:#ef444418; color:#ef4444; }
  .badge-dv   { background:#dc262618; color:#dc2626; }
  .badge-ok   { background:#22c55e18; color:#22c55e; }
  .badge-rede { background:#8b5cf618; color:#8b5cf6; }

  /* ── Regras ── */
  .regras-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
  .regra-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
  .regra-card h3 { margin:0 0 10px; font-size:12px; font-weight:700; text-transform:uppercase; color:var(--muted); }
  .rf { display:flex; flex-direction:column; gap:3px; margin-bottom:8px; }
  .rf label { font-size:10px; color:var(--muted); }
  .rf input { background:var(--bg); border:1px solid var(--border); color:var(--text);
    padding:5px 8px; border-radius:5px; font-size:12px; width:100%; box-sizing:border-box; }
  .rf input:focus { outline:none; border-color:var(--accent,#3b82f6); }

  /* ── File drop ── */
  .file-drop { border:2px dashed var(--border); border-radius:var(--radius); padding:28px;
    text-align:center; cursor:pointer; color:var(--muted); font-size:12px; margin-bottom:16px; }
  .file-drop:hover { border-color:var(--accent,#3b82f6); color:var(--text); }

  /* ── Misc ── */
  .hidden { display:none !important; }
  .spinner { display:inline-block; width:13px; height:13px; border:2px solid var(--muted);
    border-top-color:var(--accent,#3b82f6); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cf-empty { padding:32px; text-align:center; color:var(--muted); }
  .perc-bar { display:inline-block; height:4px; background:var(--accent,#3b82f6); border-radius:2px; opacity:.4; vertical-align:middle; margin-left:4px; }
</style>
</head>
<body>

<div class="cf-topbar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    <polyline points="7 8 10 11 13 8"/>
  </svg>
  <h1>Conferência de Caixa — Escritório</h1>
  <span class="cf-user" id="userLabel"></span>
</div>

<div class="cf-tabs">
  <button class="cf-tab active" data-tab="vendas">Vendas</button>
  <button class="cf-tab" data-tab="conciliacao">Conciliação Rede</button>
  <button class="cf-tab" data-tab="regras">Regras por Loja</button>
</div>

<!-- ══ VENDAS ════════════════════════════════════════════════════════════ -->
<div class="cf-panel active" id="tab-vendas">
  <div class="cf-filters">
    <div class="cf-fgroup">
      <label>Loja</label>
      <select id="vBoard"></select>
    </div>
    <div class="cf-fgroup">
      <label>De</label>
      <input type="date" id="vDtIni"/>
    </div>
    <div class="cf-fgroup">
      <label>Até</label>
      <input type="date" id="vDtFin"/>
    </div>
    <div class="cf-fgroup">
      <label>&nbsp;</label>
      <button class="btn-p" id="vBuscarBtn">Buscar</button>
    </div>
    <div class="cf-fgroup" style="margin-left:auto">
      <label>Agrupar</label>
      <div class="btn-grp">
        <button class="btn-seg active" data-grupo="lista">Lista</button>
        <button class="btn-seg" data-grupo="forma">Forma Pgto</button>
        <button class="btn-seg" data-grupo="vendedor">Vendedor</button>
      </div>
    </div>
  </div>
  <div id="vSummary"></div>
  <div id="vResult"></div>
</div>

<!-- ══ CONCILIAÇÃO REDE ══════════════════════════════════════════════════ -->
<div class="cf-panel" id="tab-conciliacao">
  <div class="cf-filters">
    <div class="cf-fgroup">
      <label>Loja</label>
      <select id="cBoard"></select>
    </div>
    <div class="cf-fgroup">
      <label>De</label>
      <input type="date" id="cDtIni"/>
    </div>
    <div class="cf-fgroup">
      <label>Até</label>
      <input type="date" id="cDtFin"/>
    </div>
  </div>
  <div class="file-drop" id="fileDrop">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 8px">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Arraste o arquivo da Rede aqui ou <strong>clique para selecionar</strong>
    <div style="font-size:10px;margin-top:4px;color:var(--muted)">Excel (.xlsx, .xls) ou CSV</div>
    <input type="file" id="redeFile" accept=".xlsx,.xls,.csv" style="display:none"/>
  </div>
  <div id="cResult"></div>
</div>

<!-- ══ REGRAS ════════════════════════════════════════════════════════════ -->
<div class="cf-panel" id="tab-regras">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <p style="margin:0;font-size:12px;color:var(--muted)">Configure os limites por loja. Valor 0 desativa a verificação.</p>
    <button class="btn-p" id="salvarRegrasBtn" style="margin-left:auto">Salvar</button>
  </div>
  <div class="regras-grid" id="regrasGrid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="/conferencia.js"></script>
</body>
</html>
