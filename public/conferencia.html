<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Conferência de Caixa</title>
<link rel="stylesheet" href="/style.css"/>
<style>
  body { background: var(--bg); color: var(--text); font-family: var(--font); margin: 0; }
  .conf-header { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); }
  .conf-header h1 { font-size:15px; font-weight:600; margin:0; }
  .conf-tabs { display:flex; gap:4px; padding:12px 20px 0; border-bottom:1px solid var(--border); }
  .conf-tab { padding:8px 16px; border-radius:6px 6px 0 0; font-size:13px; cursor:pointer; border:1px solid transparent; color:var(--muted); background:none; }
  .conf-tab.active { border-color:var(--border); border-bottom-color:var(--bg); background:var(--bg); color:var(--text); font-weight:600; }
  .conf-panel { display:none; padding:20px; }
  .conf-panel.active { display:block; }
  .form-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; }
  .form-group { display:flex; flex-direction:column; gap:4px; }
  .form-group label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .form-group select, .form-group input { background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:6px 10px; border-radius:6px; font-size:13px; }
  .btn-primary { background:var(--accent,#3b82f6); color:#fff; border:none; padding:7px 16px; border-radius:6px; font-size:13px; cursor:pointer; }
  .btn-primary:hover { opacity:.85; }
  .btn-secondary { background:var(--surface2,#2a2a2a); color:var(--text); border:1px solid var(--border); padding:7px 16px; border-radius:6px; font-size:13px; cursor:pointer; }
  .regras-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .regra-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .regra-card h3 { margin:0 0 12px; font-size:13px; font-weight:600; text-transform:uppercase; }
  .regra-field { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  .regra-field label { font-size:11px; color:var(--muted); }
  .regra-field input { background:var(--surface2,#1e1e1e); border:1px solid var(--border); color:var(--text);
    padding:5px 8px; border-radius:5px; font-size:13px; width:100%; box-sizing:border-box; }
  .alert-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .badge-parcela { background:#f59e0b22; color:#f59e0b; }
  .badge-desc-item { background:#ef444422; color:#ef4444; }
  .badge-desc-venda { background:#dc262622; color:#dc2626; }
  .badge-ok { background:#22c55e22; color:#22c55e; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { padding:6px 10px; text-align:left; font-size:11px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:500; }
  td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
  tr:hover td { background:var(--surface2,#1e1e1e); }
  .alerta-list { display:flex; flex-direction:column; gap:3px; }
  .alerta-msg { font-size:11px; color:var(--muted); }
  .status-ok { color:#22c55e; font-size:11px; }
  .status-div { color:#ef4444; font-size:11px; font-weight:600; }
  .status-mx { color:#f59e0b; font-size:11px; }
  .status-rede { color:#8b5cf6; font-size:11px; }
  .summary-bar { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .summary-chip { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 14px; font-size:12px; }
  .summary-chip strong { display:block; font-size:18px; font-weight:700; }
  .file-drop { border:2px dashed var(--border); border-radius:8px; padding:32px; text-align:center; cursor:pointer; color:var(--muted); font-size:13px; }
  .file-drop:hover { border-color:var(--accent,#3b82f6); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color:var(--accent,#3b82f6); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="conf-header">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    <polyline points="7 8 10 11 13 8"/>
  </svg>
  <h1>Conferência de Caixa — Escritório</h1>
  <span id="userLabel" style="margin-left:auto;font-size:12px;color:var(--muted)"></span>
</div>

<div class="conf-tabs">
  <button class="conf-tab active" data-tab="regras">Regras por Loja</button>
  <button class="conf-tab" data-tab="alertas">Alertas de Venda</button>
  <button class="conf-tab" data-tab="conciliacao">Conciliação Rede</button>
</div>

<!-- ── PAINEL: REGRAS ─────────────────────────────────────────────────── -->
<div class="conf-panel active" id="tab-regras">
  <div class="form-row" style="margin-bottom:16px">
    <p style="margin:0;font-size:13px;color:var(--muted)">
      Configure os limites para cada loja. Deixe 0 para desativar a verificação.
    </p>
    <button class="btn-primary" id="salvarRegrasBtn">Salvar Regras</button>
  </div>
  <div class="regras-grid" id="regrasGrid"></div>
</div>

<!-- ── PAINEL: ALERTAS ───────────────────────────────────────────────── -->
<div class="conf-panel" id="tab-alertas">
  <div class="form-row">
    <div class="form-group">
      <label>Loja</label>
      <select id="alertaBoard"></select>
    </div>
    <div class="form-group">
      <label>Data Início</label>
      <input type="date" id="alertaDtIni"/>
    </div>
    <div class="form-group">
      <label>Data Fim</label>
      <input type="date" id="alertaDtFin"/>
    </div>
    <div class="form-group">
      <label>&nbsp;</label>
      <button class="btn-primary" id="buscarAlertasBtn">Buscar</button>
    </div>
  </div>
  <div id="alertasResult"></div>
</div>

<!-- ── PAINEL: CONCILIAÇÃO REDE ──────────────────────────────────────── -->
<div class="conf-panel" id="tab-conciliacao">
  <div class="form-row">
    <div class="form-group">
      <label>Loja</label>
      <select id="concBoard"></select>
    </div>
    <div class="form-group">
      <label>Data Início</label>
      <input type="date" id="concDtIni"/>
    </div>
    <div class="form-group">
      <label>Data Fim</label>
      <input type="date" id="concDtFin"/>
    </div>
  </div>
  <div class="file-drop" id="fileDrop">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:8px">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div>Arraste o arquivo da Rede aqui ou <strong>clique para selecionar</strong></div>
    <div style="font-size:11px;margin-top:4px">Formatos aceitos: Excel (.xlsx, .xls) ou CSV</div>
    <input type="file" id="redeFile" accept=".xlsx,.xls,.csv" style="display:none"/>
  </div>
  <div id="concResult" style="margin-top:16px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="/conferencia.js"></script>
</body>
</html>
