services:
  - type: web
    name: gestao-lojas
    runtime: node
    buildCommand: npm install && PUPPETEER_CACHE_DIR=/opt/render/project/src/.puppeteer npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: DATA_DIR
        value: /var/data
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MICROVIX_PORTAL_USER
        sync: false
      - key: MICROVIX_PORTAL_PASS
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.puppeteer
    disk:
      name: gestao-lojas-data
      mountPath: /var/data
      sizeGB: 1
